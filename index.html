<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" type="text/css" href="style.css">
  
  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <main class="card-container">
    <div class="image-container">
      <img class="img-mobile" src="./images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum">
      <img class="img-desktop" src="./images/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum">
    </div>

    <section class="card-content-container">
      <section class="card-text-container">
        <p class="product-category">Perfume</p>

        <h1 class="product-title">Gabrielle Essence Eau De Parfum</h1>

        <p class="product-desc">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>
      </section>

      <div class="card-pricing-container">
        <p class="product-price-big">$149.99</p>
        <p class="product-price-small">$169.99</p>
      </div>

      <button class="btn" id="add-to-cart-btn" type="button"><img src="./images/icon-cart.svg" alt="" aria-hidden="true"> Add to Cart</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
